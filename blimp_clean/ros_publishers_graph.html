<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Blimp ROS Publisher Graph</title>
  <script src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
  <link  href="https://unpkg.com/vis-network@9.1.9/dist/dist/vis-network.min.css" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .02em; }
    header p  { font-size: .8rem; color: #8892b0; }

    .legend {
      display: flex;
      gap: 20px;
      margin-left: auto;
      font-size: .78rem;
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .legend-dot  { width: 12px; height: 12px; border-radius: 50%; }
    .legend-rect { width: 16px; height: 10px; border-radius: 3px; }

    #graph { flex: 1; }

    /* tooltip */
    #tooltip {
      position: absolute;
      background: #1e2130;
      border: 1px solid #3d4266;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .8rem;
      line-height: 1.6;
      pointer-events: none;
      display: none;
      max-width: 260px;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }
    #tooltip strong { color: #7ee8fa; }
    #tooltip .tag {
      display: inline-block;
      background: #2d3560;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: .72rem;
      color: #a8b4d8;
      margin-top: 4px;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>ROS Publisher Graph</h1>
    <p>Nodes → topics, edges labeled with message type</p>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#5e81f4"></div> ROS Node
    </div>
    <div class="legend-item">
      <div class="legend-rect" style="background:#2a4a3e; border:1px solid #3ecf8e"></div> Topic
    </div>
    <div class="legend-item" style="color:#8892b0; font-size:.74rem">
      Shared topics merge automatically
    </div>
  </div>
</header>

<div id="graph"></div>
<div id="tooltip"></div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const ROS_NODES = [
  {
    id: "SetupGuiNode",
    file: "setup_gui_node.py",
    publishers: [
      { topic: "/motor_cmd",         msgType: "MotorMsg"   },
      { topic: "/blimps_initialize", msgType: "Blimps"     },
      { topic: "/teleop_mode",       msgType: "TeleopMode" },
    ]
  },
  {
    id: "OptiTrackNode",
    file: "optitrack_node.py",
    publishers: [
      { topic: "/optitrack_node/discovered_id",      msgType: "Int32"        },
      { topic: "/agent_{id}/controller/goal",        msgType: "GoalMsg",  dynamic: true },
      { topic: "/agent_{id}/optitrack_node/pose",    msgType: "OptiTrackPose", dynamic: true },
    ]
  },
  {
    id: "TeleopReceiver",
    file: "teleop_receiver.py",
    publishers: [
      { topic: "/motor_cmd",                           msgType: "MotorMsg" },
      { topic: "/fly_to_goal",                         msgType: "Bool"     },
      { topic: "/agent_{blimp}/controller/goal_inc",   msgType: "GoalMsg", dynamic: true },
    ]
  },
  {
    id: "ControllerNode",
    file: "low_level_controller.py",
    publishers: [
      { topic: "motor_cmd",  msgType: "MotorMsg" },
    ]
  },
];

// Normalise topic names so shared topics get merged
// (strip leading slash, treat motor_cmd and /motor_cmd as same)
function normaliseTopic(t) { return t.replace(/^\//, ""); }

// ─── BUILD VIS DATASET ───────────────────────────────────────────────────────
const nodes = new vis.DataSet();
const edges = new vis.DataSet();

// Colour palette per message type
const MSG_COLORS = {
  "MotorMsg":       { bg: "#3b2f4e", border: "#9b72cf", label: "#c4a0f5" },
  "Blimps":         { bg: "#2f3b4e", border: "#72a0cf", label: "#a0c4f5" },
  "TeleopMode":     { bg: "#2f4e3b", border: "#72cf9b", label: "#a0f5c4" },
  "Int32":          { bg: "#4e3b2f", border: "#cf9b72", label: "#f5c4a0" },
  "GoalMsg":        { bg: "#4e2f3b", border: "#cf7296", label: "#f5a0b8" },
  "OptiTrackPose":  { bg: "#3b4e2f", border: "#96cf72", label: "#c4f5a0" },
  "Bool":           { bg: "#4e4a2f", border: "#cfc072", label: "#f5e8a0" },
};
function msgColor(t) { return MSG_COLORS[t] || { bg:"#2e3348", border:"#607080", label:"#aab8c8" }; }

// Node → circle
ROS_NODES.forEach(n => {
  nodes.add({
    id:    "node:" + n.id,
    label: n.id,
    title: `<b>${n.id}</b><br/><span style="color:#8892b0">${n.file}</span>`,
    shape: "dot",
    size:  22,
    color: { background: "#5e81f4", border: "#8faaf8", highlight: { background: "#7c9cf5", border: "#aec3ff" } },
    font:  { color: "#e2e8f0", size: 14, bold: true },
    group: "rosnode",
  });
});

// Topic → box (deduplicated by normalised name)
const topicMeta = {};   // normTopic → { msgType, dynamic, label }
ROS_NODES.forEach(n => {
  n.publishers.forEach(p => {
    const key = normaliseTopic(p.topic);
    if (!topicMeta[key]) {
      topicMeta[key] = { msgType: p.msgType, dynamic: !!p.dynamic, topic: p.topic };
    }
  });
});

Object.entries(topicMeta).forEach(([key, meta]) => {
  const c = msgColor(meta.msgType);
  const dynTag = meta.dynamic ? " ⟨dynamic⟩" : "";
  nodes.add({
    id:    "topic:" + key,
    label: "/" + key + dynTag,
    title: `<b>${meta.topic}</b><br/>Type: <b>${meta.msgType}</b>${meta.dynamic ? "<br/><i>per-blimp topic</i>" : ""}`,
    shape: "box",
    color: { background: c.bg, border: c.border, highlight: { background: c.bg, border: "#ffffff" } },
    font:  { color: c.label, size: 12 },
    margin: 8,
    group: "topic",
  });
});

// Edges
let edgeId = 0;
ROS_NODES.forEach(n => {
  n.publishers.forEach(p => {
    const key = normaliseTopic(p.topic);
    const c = msgColor(p.msgType);
    edges.add({
      id:     edgeId++,
      from:   "node:" + n.id,
      to:     "topic:" + key,
      label:  p.msgType,
      arrows: { to: { enabled: true, scaleFactor: 0.7 } },
      color:  { color: c.border, highlight: "#ffffff" },
      font:   { color: c.label, size: 11, align: "middle",
                background: "#12151f", strokeWidth: 0 },
      smooth: { type: "cubicBezier", forceDirection: "horizontal", roundness: 0.4 },
      width:  1.5,
    });
  });
});

// ─── NETWORK ─────────────────────────────────────────────────────────────────
const container = document.getElementById("graph");
const options = {
  layout: {
    hierarchical: {
      enabled:       true,
      direction:     "LR",
      sortMethod:    "directed",
      levelSeparation: 220,
      nodeSpacing:   90,
      treeSpacing:   160,
    }
  },
  physics: { enabled: false },
  interaction: {
    hover:          true,
    tooltipDelay:   120,
    navigationButtons: false,
    keyboard:       true,
    zoomView:       true,
  },
  edges: {
    selectionWidth: 3,
  },
  nodes: {
    borderWidth: 1.5,
  },
};

const network = new vis.Network(container, { nodes, edges }, options);

// ─── TOOLTIP ─────────────────────────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");

network.on("hoverNode", params => {
  const node = nodes.get(params.node);
  if (!node) return;

  let html = `<strong>${node.label.replace(/ ⟨dynamic⟩/, "")}</strong><br/>`;

  if (node.group === "rosnode") {
    const pubs = ROS_NODES.find(n => "node:" + n.id === node.id)?.publishers || [];
    html += `<span style="color:#8892b0">Publishes ${pubs.length} topic${pubs.length !== 1 ? "s" : ""}:</span><br/>`;
    pubs.forEach(p => {
      const c = msgColor(p.msgType);
      html += `<span class="tag" style="border:1px solid ${c.border};color:${c.label}">${p.msgType}</span> ${p.topic}<br/>`;
    });
  } else {
    const meta = topicMeta[params.node.replace("topic:", "")];
    if (meta) {
      const c = msgColor(meta.msgType);
      html += `Type: <span class="tag" style="border:1px solid ${c.border};color:${c.label}">${meta.msgType}</span><br/>`;
      if (meta.dynamic) html += `<span style="color:#8892b0;font-size:.72rem">Per-blimp dynamic topic</span>`;
    }
  }

  tooltip.innerHTML = html;
  tooltip.style.display = "block";
});

network.on("blurNode", () => { tooltip.style.display = "none"; });

network.on("mouseMoved", params => {
  tooltip.style.left = (params.event.clientX + 18) + "px";
  tooltip.style.top  = (params.event.clientY - 10) + "px";
});

// Fit on load
network.once("stabilized", () => network.fit({ animation: { duration: 500 } }));
</script>
</body>
</html>
